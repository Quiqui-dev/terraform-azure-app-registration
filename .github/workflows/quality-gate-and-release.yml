name: Tf PR Quality Gate (Caller Example)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate:
    uses: Quiqui-dev/central-platform-automations/.github/workflows/terraform-pr-quality-single-module.yml@v1
    with:
      terraform-path: .
      base-sha: ${{ github.event.pull_request.base.sha }}
      head-sha: ${{ github.event.pull_request.head.sha }}
      pr-number: ${{ github.event.pull_request.number }}
      run-tfsec: true
      run-only-when-tf-changed: true
    secrets:
      github-token: ${{secrets.GITHUB_TOKEN}}
